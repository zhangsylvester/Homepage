<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dual Affine Robinson&ndash;Schensted</title>
<style>
 :root{--bg:#fff;--ink:#16181b;--muted:#6b7280;--line:#e6e7ea;--card:#fbfbfc;--accent:#0072B2;--good:#0a7d33;--bad:#b00020}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;line-height:1.55}
 .wrap{max-width:1200px;margin:0 auto;padding:22px 20px 70px}
 .top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:4px}
 h1{font-size:21px;margin:0;font-weight:700}
 .modeswitch{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-left:auto}
 .modeswitch button{border:none;border-radius:0;padding:8px 16px;background:#fff;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px}
 .modeswitch button.active{background:var(--accent);color:#fff}
 .modeswitch button:not(.active):hover{background:#f3f4f6}
 .sub{color:var(--muted);font-size:13px;margin:6px 0 16px}
 .sub a{color:var(--accent)}
 .controls{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:8px}
 input[type=text]{font:inherit;padding:7px 10px;border:1px solid var(--line);border-radius:8px;width:200px;background:#fff;color:var(--ink)}
 input[type=text]:focus{outline:2px solid #cfe6f3;border-color:var(--accent)}
 button{font:inherit;padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);cursor:pointer}
 button:hover{background:#f3f4f6}
 .chip{padding:5px 9px;font-size:12px;border-radius:999px;background:#f1f3f5;border:1px solid var(--line)}
 .chip:hover{background:#e7eaee}
 label.opt{font-size:12px;color:var(--muted);display:inline-flex;gap:5px;align-items:center;cursor:pointer}
 .err{min-height:20px;font-size:13px;margin:2px 0 12px;color:var(--bad)}
 .view{display:none}.view.active{display:block}
 /* cards / tabloids shared */
 .card{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:16px}
 .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 12px}
 .tab{display:inline-block}.trow{display:flex}
 .cell{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1.6px solid #999;border-right:none;font-weight:700;transition:border-color .85s ease,color .85s ease}
 .trow .cell:last-child{border-right:1.6px solid #999}
 .young{display:inline-block}.yrow{display:flex}
 .yc{width:15px;height:15px;border:1px solid #c2c4c8;background:#eef0f2}
 .kv{display:flex;gap:6px;flex-wrap:wrap;font-size:13px;margin-top:2px}
 .pill{padding:2px 8px;border-radius:6px;background:#eef2f5;font-size:12px;display:inline-block;margin:2px 4px 2px 0}
 .pill.good{background:#e7f6ec;color:var(--good)}
 .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:0 0 10px}
 .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px;transition:background .85s ease}
 .blk{margin-bottom:14px}.blk .t{font-size:12px;color:var(--muted);margin-bottom:5px}
 .row{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
 .lambdatab{font-size:12px;border-collapse:collapse;margin-top:6px}
 .lambdatab td,.lambdatab th{padding:2px 8px;text-align:left;border-bottom:1px solid var(--line)}
 .lambdatab tr.stable td{font-weight:700;color:var(--accent)}
 code{background:#f1f3f5;padding:1px 5px;border-radius:5px}
 .sl{transition:stroke .85s ease,opacity .08s,stroke-width .08s;cursor:pointer}
 .stage svg text,.diagwrap svg text{transition:fill .85s ease}
 svg.hoverable.hovering .sl{opacity:.13}
 svg.hoverable.hovering .sl.hl{opacity:1;stroke-width:3.6}
 .tip{position:fixed;pointer-events:none;background:#16181b;color:#fff;padding:5px 8px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .1s;z-index:9;white-space:nowrap}
 /* calc layout */
 .grid{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
 @media(max-width:900px){.grid{grid-template-columns:1fr}}
 .diagwrap{position:relative;overflow:auto;max-height:620px;border:1px solid var(--line);border-radius:8px;background:#fff}
 /* illus layout */
 .steps{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px}
 .step{display:flex;gap:9px;align-items:center;padding:8px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}
 .step .num{width:22px;height:22px;border-radius:50%;background:#eef0f2;color:#555;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none}
 .step .lab{font-size:13px}.step.active{border-color:var(--accent);background:#f2f9fd}
 .step.active .num{background:var(--accent);color:#fff}.step .lab small{color:var(--muted);display:block;font-size:11px}
 .nav{display:flex;gap:8px;align-items:center;margin-left:auto}
 .main{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
 @media(max-width:900px){.main{grid-template-columns:1fr}}
 .stage{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;overflow:auto;max-height:70vh}
 .stage svg{display:block;margin:0 auto}
 .panel{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:16px}
 .panel h2{font-size:14px;margin:0 0 8px}.panel p{margin:0 0 10px;color:#2b2f33}.panel .k{color:var(--muted)}
 .out{display:flex;gap:22px;flex-wrap:wrap;margin-top:6px}
 .foot{margin-top:16px;font-size:12px;color:var(--muted)} .foot.bad{color:var(--bad)} .foot.ok{color:var(--good)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Dual Affine Robinson&ndash;Schensted</h1>
    <div class="modeswitch">
      <button data-mode="calc" class="active">Calculation mode</button>
      <button data-mode="illus">Illustration mode</button>
    </div>
  </div>
  <div class="sub" id="sub"></div>

  <div class="controls">
    <span class="k" style="color:var(--muted)">w =</span>
    <input id="win" type="text" value="10, 3, -3, 12" autocomplete="off" spellcheck="false" aria-label="affine permutation window">
    <button id="rand">Random</button>
    <button class="chip" data-ex="10, 3, -3, 12">paper [10,3,&#8722;3,12]</button>
    <button class="chip" data-ex="5, 4, 3">[5,4,3]</button>
    <button class="chip" data-ex="4, 3, 2">[4,3,2]</button>
    <button class="chip" data-ex="2, 0, 6, 4, -2">[2,0,6,4,&#8722;2]</button>
    <button class="chip" data-ex="3, 2">[3,2]</button>
    <span id="calcopts" style="display:inline-flex;gap:12px;margin-left:4px">
      <label class="opt"><input type="checkbox" id="optBoundary" checked> west labels</label>
      <label class="opt"><input type="checkbox" id="optEdges"> edge labels</label>
    </span>
  </div>
  <div id="err" class="err"></div>

  <!-- ===== Calculation mode ===== -->
  <div id="calc" class="view active">
    <div class="grid">
      <div class="card" id="calc-result"></div>
      <div class="card">
        <h2>Affine growth diagram</h2>
        <div class="legend" id="clegend"></div>
        <div class="diagwrap"><div id="cdiag"></div></div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px">
          Hover a shadow line to highlight it. Marks <b>&#9679;</b> are tiles with <code>w(j)=i</code>;
          the bold box is the first stable window <code>&#937;<sub>N&#8320;</sub></code>.</div>
      </div>
    </div>
    <div class="foot" id="cfoot"></div>
  </div>

  <!-- ===== Illustration mode ===== -->
  <div id="illus" class="view">
    <div class="steps" id="steps"></div>
    <div class="main">
      <div class="stage"><div id="idiag">&nbsp;</div></div>
      <div class="panel" id="panel"></div>
    </div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script>
/* Dual Affine Robinson--Schensted correspondence -- browser/jsc port.
 *
 * A faithful JavaScript port of dual_affine_rs.py (Huang--Zhang, arXiv:2605.20383).
 * No DOM dependencies: this file only computes and returns SVG strings, so it can
 * be unit-tested under `jsc`.  Conventions and algorithm match the Python exactly.
 */
(function (root) {
  "use strict";

  // ---- partitions -------------------------------------------------------
  function trim(a) { a = a.slice(); while (a.length && a[a.length - 1] === 0) a.pop(); return a; }
  function eqArr(a, b) { a = trim(a); b = trim(b); if (a.length !== b.length) return false; for (var i = 0; i < a.length; i++) if (a[i] !== b[i]) return false; return true; }
  function isPartition(seq) { var s = trim(seq); for (var i = 0; i < s.length; i++) { if (s[i] < 0) return false; if (i + 1 < s.length && s[i] < s[i + 1]) return false; } return true; }
  function conjugate(part) { var p = trim(part); if (!p.length) return []; var out = []; for (var c = 1; c <= p[0]; c++) { var cnt = 0; for (var i = 0; i < p.length; i++) if (p[i] >= c) cnt++; out.push(cnt); } return out; }
  function partFromColumnHeights(h) { return conjugate(trim(h)); }
  function diffComposition(big, small) { var L = Math.max(big.length, small.length), o = []; for (var k = 0; k < L; k++) o.push((big[k] || 0) - (small[k] || 0)); return trim(o); }
  function sum(a) { var s = 0; for (var i = 0; i < a.length; i++) s += a[i]; return s; }

  // ---- classical RSK (row insertion) ------------------------------------
  function bisectLeft(arr, x) { var lo = 0, hi = arr.length; while (lo < hi) { var mid = (lo + hi) >> 1; if (arr[mid] < x) lo = mid + 1; else hi = mid; } return lo; }
  function rskTableau(word) {
    var rows = [];
    for (var t = 0; t < word.length; t++) {
      var cur = word[t], r = 0;
      while (true) {
        if (r === rows.length) { rows.push([cur]); break; }
        var row = rows[r], pos = bisectLeft(row, cur);
        if (pos === row.length) { row.push(cur); break; }
        var tmp = row[pos]; row[pos] = cur; cur = tmp; r++;
      }
    }
    return rows;
  }
  function rskShape(word) { return rskTableau(word).map(function (r) { return r.length; }); }

  // ---- extended affine symmetric group ----------------------------------
  function AffinePerm(window) {
    if (!(this instanceof AffinePerm)) return new AffinePerm(window);
    this.w = window.slice(); this.n = window.length; this._validate();
  }
  AffinePerm.prototype._validate = function () {
    var n = this.n;
    if (n === 0) throw new Error("empty window");
    var res = this.w.map(function (v) { return ((v % n) + n) % n; }).sort(function (a, b) { return a - b; });
    for (var i = 0; i < n; i++) if (res[i] !== i)
      throw new Error("[" + this.w.join(", ") + "] is not a valid affine window (entries must hit each residue mod " + n + " once)");
  };
  AffinePerm.prototype.call = function (j) { var n = this.n, q = Math.floor((j - 1) / n), r = (j - 1) - q * n; return this.w[r] + n * q; };
  AffinePerm.prototype.index = function () { var s = 0; for (var j = 1; j <= this.n; j++) s += this.w[j - 1] - j; return s / this.n; };
  AffinePerm.prototype.windowStr = function () { return "[" + this.w.join(", ") + "]"; };
  AffinePerm.prototype.inverse = function () {
    var n = this.n, D = 0;
    for (var k = 0; k < n; k++) D = Math.max(D, Math.abs(this.w[k] - (k + 1)));
    var spread = D + 1, inv = [];
    for (var i = 1; i <= n; i++) { var found = null; for (var j = i - spread; j <= i + spread; j++) if (this.call(j) === i) { found = j; break; } if (found === null) throw new Error("inverse search failed"); inv.push(found); }
    return new AffinePerm(inv);
  };

  // ---- lambda^m and the first stable window N0 --------------------------
  function windowWordBelow(ap, threshold) {
    var n = ap.n, word = [], k = n + 1, misses = 0;
    while (misses < n) { var v = ap.call(k); if (v <= threshold) { word.push(v); misses = 0; } else misses++; k++; }
    return word;
  }
  function lambdaM(ap, m) { return rskShape(windowWordBelow(ap, ap.n * (m - 1))); }
  function firstFullWindow(ap) { var Wmax = Math.max.apply(null, ap.w); return Math.ceil(Wmax / ap.n) + 1; }
  function findFirstStableWindow(ap, search) {
    var n = ap.n, Nfull = firstFullWindow(ap);
    if (search == null) search = 6 * n + 40;
    var lam = {};
    for (var m = Nfull; m <= Nfull + search + 2; m++) lam[m] = lambdaM(ap, m);
    for (var mm = Nfull; mm < Nfull + search; mm++) {
      var mu1 = diffComposition(lam[mm + 1], lam[mm]);
      var mu2 = diffComposition(lam[mm + 2], lam[mm + 1]);
      if (isPartition(mu1) && eqArr(mu1, mu2)) return { N0: mm, lam: trim(lam[mm]), mu: trim(mu1) };
    }
    throw new Error("no stable window found within search range");
  }

  // ---- the affine growth diagram with colored shadow lines --------------
  function UF() { this.p = {}; }
  UF.prototype.find = function (x) { if (!(x in this.p)) this.p[x] = x; var root = x; while (this.p[root] !== root) root = this.p[root]; while (this.p[x] !== root) { var nx = this.p[x]; this.p[x] = root; x = nx; } return root; };
  UF.prototype.union = function (a, b) { var ra = this.find(a), rb = this.find(b); if (ra !== rb) this.p[ra] = rb; };

  function GrowthDiagram(ap, N0) { this.ap = ap; this.N0 = N0; this.H = {}; this.V = {}; }
  function key(i, j) { return i + "," + j; }

  GrowthDiagram.build = function (ap, N0) {
    var n = ap.n, D = new GrowthDiagram(ap, N0);
    var Wmin = Math.min.apply(null, ap.w);
    D.i_top = Wmin - 1;
    D.i_bot = N0 * n + n;
    var j_right = (N0 + 2) * n;
    while (true) { var tmin = Infinity; for (var b = j_right; b < j_right + n; b++) tmin = Math.min(tmin, ap.call(b)); if (tmin > D.i_bot) break; j_right += n; }
    D.j_right = j_right;
    D._fill(); D._components(); D._color();
    return D;
  };

  GrowthDiagram.prototype._fill = function () {
    var ap = this.ap, n = ap.n, H = this.H, V = this.V;
    var i_top = this.i_top, i_bot = this.i_bot, j_right = this.j_right;
    for (var j = 1; j <= j_right; j++) H[key(i_top - 1, j)] = 0;
    for (var i = i_top; i <= i_bot; i++) V[key(i, j_right)] = 0;
    for (i = i_top; i <= i_bot; i++) {
      for (j = j_right; j >= 1; j--) {
        var north = H[key(i - 1, j)], east = V[key(i, j)];
        var marked = (ap.call(j) === i), south, west;
        if (marked) { if (north !== 0 || east !== 0) throw new Error("marked tile (" + i + "," + j + ") N=" + north + " E=" + east); south = 1; west = 1; }
        else if (north !== east) { south = north; west = east; }
        else { var a = north; if (a === 0) { south = 0; west = 0; } else { south = a + 1; west = a + 1; } }
        H[key(i, j)] = south; V[key(i, j - 1)] = west;
      }
    }
  };

  GrowthDiagram.prototype._tileEdges = function (i, j) {
    return { north: "H," + (i - 1) + "," + j, south: "H," + i + "," + j, west: "V," + i + "," + (j - 1), east: "V," + i + "," + j };
  };
  GrowthDiagram.prototype.labelOfEdge = function (e) { var p = e.split(","), kind = p[0], r = +p[1], c = +p[2]; return kind === "H" ? this.H[key(r, c)] : this.V[key(r, c)]; };

  GrowthDiagram.prototype._components = function () {
    var ap = this.ap, H = this.H, V = this.V, uf = new UF();
    this.uf = uf;
    var i, j;
    for (i = this.i_top; i <= this.i_bot; i++) for (j = 1; j <= this.j_right; j++) {
      var ed = this._tileEdges(i, j);
      var nL = H[key(i - 1, j)], eL = V[key(i, j)], sL = H[key(i, j)], wL = V[key(i, j - 1)];
      var marked = (ap.call(j) === i);
      if (nL === 0 && eL === 0 && sL === 0 && wL === 0) continue;
      if (marked) uf.union(ed.south, ed.west);
      else if (nL === eL) { uf.union(ed.north, ed.east); uf.union(ed.south, ed.west); }
      else { if (nL !== 0) uf.union(ed.north, ed.south); if (eL !== 0) uf.union(ed.east, ed.west); }
    }
    // members & component labels
    this.members = {}; this.compLabel = {};
    var self = this;
    function lab(e) { return self.labelOfEdge(e); }
    for (var e in uf.p) { var rt = uf.find(e); (this.members[rt] || (this.members[rt] = [])).push(e); this.compLabel[rt] = lab(e); }
    // crossing pairs (two shadow lines that actually cross, at a cross tile)
    var crossing = {};
    for (i = this.i_top; i <= this.i_bot; i++) for (j = 1; j <= this.j_right; j++) {
      var nL2 = H[key(i - 1, j)], eL2 = V[key(i, j)];
      var marked2 = (ap.call(j) === i);
      if (!marked2 && nL2 !== eL2 && nL2 !== 0 && eL2 !== 0) {
        var e2 = this._tileEdges(i, j);
        var vroot = uf.find(e2.north), hroot = uf.find(e2.east);
        crossing[[vroot, hroot].sort().join("|")] = true;
      }
    }
    // repelling parents at bump tiles (only for non-crossing pairs)
    this.repelParent = {};
    for (i = this.i_top; i <= this.i_bot; i++) for (j = 1; j <= this.j_right; j++) {
      var nL3 = H[key(i - 1, j)], eL3 = V[key(i, j)];
      var marked3 = (ap.call(j) === i);
      if (!marked3 && nL3 === eL3 && nL3 !== 0) {
        var e3 = this._tileEdges(i, j);
        var ne = uf.find(e3.north), sw = uf.find(e3.south);
        if (crossing[[ne, sw].sort().join("|")]) continue;
        if (sw in this.repelParent && this.repelParent[sw] !== ne) throw new Error("non-unique repeller");
        this.repelParent[sw] = ne;
      }
    }
  };

  GrowthDiagram.prototype._color = function () {
    var uf = this.uf, crossings = [], seen = {};
    for (var i = this.i_top; i <= this.i_bot; i++) {
      if (this.V[key(i, 0)] === 1) {
        var root = uf.find("V," + i + ",0");
        if (this.compLabel[root] === 1 && !(root in seen)) { seen[root] = true; crossings.push([i, root]); }
      }
    }
    crossings.sort(function (a, b) { return a[0] - b[0]; });
    this.N = crossings.length;
    this.colorOfRoot_ = {};
    for (var c = 0; c < crossings.length; c++) this.colorOfRoot_[crossings[c][1]] = c + 1;
  };

  GrowthDiagram.prototype.colorOfRoot = function (root) {
    if (root in this.colorOfRoot_) return this.colorOfRoot_[root];
    var chain = [root], cur = root;
    while (this.compLabel[cur] !== 1) {
      if (!(cur in this.repelParent)) throw new Error("no repelling parent for label " + this.compLabel[cur]);
      cur = this.repelParent[cur]; chain.push(cur);
    }
    var col = this.colorOfRoot_[cur];
    for (var k = 0; k < chain.length; k++) this.colorOfRoot_[chain[k]] = col;
    return col;
  };
  GrowthDiagram.prototype.colorOfEdge = function (e) { return this.colorOfRoot(this.uf.find(e)); };
  GrowthDiagram.prototype.lineIdOfEdge = function (e) { return this.uf.find(e); };

  GrowthDiagram.prototype.eastEdges = function (m) { var n = this.ap.n, out = []; for (var t = 1; t <= n; t++) out.push("V," + ((m - 1) * n + t) + "," + n); return out; };
  GrowthDiagram.prototype.northEdges = function (m) { var n = this.ap.n, out = []; for (var t = 1; t <= n; t++) out.push("H," + ((m - 1) * n) + "," + (n - t + 1)); return out; };
  GrowthDiagram.prototype.lambdaAt = function (m) {
    var n = this.ap.n, top = (m - 1) * n, heights = {};
    for (var t = this.i_top; t <= top; t++) { var c = this.V[key(t, n)] || 0; if (c > 0) heights[c] = (heights[c] || 0) + 1; }
    var ks = Object.keys(heights).map(Number); if (!ks.length) return [];
    var maxc = Math.max.apply(null, ks), arr = []; for (var cc = 1; cc <= maxc; cc++) arr.push(heights[cc] || 0);
    return partFromColumnHeights(arr);
  };

  // ---- forward map ------------------------------------------------------
  function dualAffineRS(ap) {
    var n = ap.n, fs = findFirstStableWindow(ap), N0 = fs.N0, lam = fs.lam, mu = fs.mu;
    var D = GrowthDiagram.build(ap, N0);
    var lamDiag = D.lambdaAt(N0);
    if (!eqArr(lamDiag, lam)) throw new Error("lambda mismatch diagram " + lamDiag + " vs " + lam);
    var eastRows = {}, northRows = {}, t, e, r;
    var ee = D.eastEdges(N0), ne = D.northEdges(N0);
    for (t = 0; t < n; t++) { r = D.colorOfEdge(ee[t]); (eastRows[r] || (eastRows[r] = [])).push(t + 1); }
    for (t = 0; t < n; t++) { r = D.colorOfEdge(ne[t]); (northRows[r] || (northRows[r] = [])).push(t + 1); }
    function tab(rows) { var mx = 0; for (var k in rows) mx = Math.max(mx, +k); var out = []; for (var i = 1; i <= mx; i++) out.push((rows[i] || []).slice().sort(function (a, b) { return a - b; })); return out; }
    var Pbar = tab(eastRows), Qbar = tab(northRows);
    var shapeP = Pbar.map(function (x) { return x.length; }), shapeQ = Qbar.map(function (x) { return x.length; });
    if (!eqArr(shapeP, shapeQ)) throw new Error("Pbar/Qbar shape mismatch");
    if (!eqArr(shapeP, mu)) throw new Error("shape != mu");
    if (sum(lam) !== n * (N0 - 2) - ap.index()) throw new Error("index relation failed");
    return { Pbar: Pbar, Qbar: Qbar, lam: lam, N0: N0, mu: mu, diagram: D, index: ap.index() };
  }

  // ---- lambda-looparrow + reverse map -----------------------------------
  function looparrow(lam, tabRows) {
    var mu = tabRows.map(function (x) { return x.length; });

  if(stage===0) return '<h2>1 &middot; The affine permutation</h2>'+
    '<p>In matrix coordinates (row <i>i</i> down, column <i>j</i> right), put a mark <b>&#9679;</b> in tile <code>(i,j)</code> exactly when <code>w(j)=i</code>.</p>'+
    '<p class="k">The window <code>['+w.w.join(", ")+']</code> gives <code>w(1..'+w.n+')</code>; the picture repeats with period <i>n</i> along the diagonal, <code>w(j+n)=w(j)+n</code>. Columns <code>1..'+w.n+'</code> are one standard window.</p>'+
    '<p class="k">index <code>i = '+w.index()+'</code>.</p>';
  if(stage===1) return '<h2>2 &middot; Edge-label growth diagram</h2>'+
    '<p>Every edge far to the north/east starts at <code>0</code>. Sweep southwest: each tile turns its (north,&nbsp;east) labels into (south,&nbsp;west) by the <b>dual growth rule</b>.</p>'+RULE+
    '<p class="k">A label is the <b>column</b> into which a box is inserted.</p>';
  if(stage===2) return '<h2>3 &middot; Shadow lines</h2>'+
    '<p>Inside each tile, join the two edges with the <b>same label</b>. This makes the <b>shadow lines</b>; each keeps a single label.</p>'+TILES+
    '<p class="k">Hover a line to highlight it. A line of label <code>a+1</code> is <b>repelled</b> by the line of label <code>a</code> they share at a bump.</p>';
  var leg=''; for(var c=1;c<=res.diagram.N;c++) leg+='<span><i style="background:var(--rv'+c+',#c9cdd1)"></i>colour '+c+'</span>';
  return '<h2>4 &middot; Colour the shadow lines</h2>'+
   '<p>There are at most <i>n</i> lines labelled <code>1</code>; order them northeast&#8594;southwest to get colours <code>1..N</code>. Following the repelling chains, every line inherits a colour. Watch the colours go in one at a time:</p>'+
   '<div class="legend">'+leg+'</div>'+
   '<div style="margin:2px 0 12px"><button id="replay">&#8635; Replay</button> <span id="cprog" class="k" style="margin-left:8px"></span></div>'+
   '<p>Read the result off the first stable window <code>&#937;<sub>'+res.N0+'</sub>&#9733;</code>:</p>'+
   '<div class="out"><div><div class="k">P&#772; (east)</div>'+tabHTML(res.Pbar,true)+'</div><div><div class="k">Q&#772; (north)</div>'+tabHTML(res.Qbar,true)+'</div></div>'+
   '<div style="margin-top:10px"><span class="pill">&lambda; = '+DARS.partStr(res.lam)+'</span><span class="pill">N&#8320; = '+res.N0+'</span><span class="pill">&mu; = '+DARS.partStr(res.mu)+'</span></div>';
 }
 function renderSteps(){
  $("#steps").innerHTML=STEPS.map(function(s,k){ return '<div class="step'+(k===stage?' active':'')+'" data-k="'+k+'"><div class="num">'+(k+1)+'</div><div class="lab">'+s.t+'<small>'+s.s+'</small></div></div>'; }).join("")+
   '<div class="nav"><button id="prev">&#8592; Prev</button><button id="next">Next &#8594;</button></div>';
  $("#steps").querySelectorAll('.step').forEach(function(e){ e.onclick=function(){ stage=+e.getAttribute('data-k'); renderIllus(); }; });
  $("#prev").onclick=function(){ stage=(stage+3)%4; renderIllus(); };
  $("#next").onclick=function(){ stage=(stage+1)%4; renderIllus(); };
 }
 function clearColours(){ var host=$("#illus"); for(var c=1;c<=9;c++) host.style.removeProperty('--rv'+c); revTimers.forEach(clearTimeout); revTimers=[]; }
 function revealColours(N){ clearColours(); var host=$("#illus"), prog=$("#cprog"); if(prog) prog.textContent='0 / '+N+' colours';
  for(var k=1;k<=N;k++){ (function(k){ revTimers.push(setTimeout(function(){ host.style.setProperty('--rv'+k,DARS.colorHex(k)); if(prog) prog.textContent=k+' / '+N+' colours'+(k===N?'  ✓':''); }, 600+(k-1)*1500)); })(k); } }
 function renderIllus(){
  var w; try{ w=getAP(); }catch(e){ err.textContent=e.message; return; }
  if(tooBig(w)){ err.textContent="diagram too large to illustrate; try smaller shifts."; return; }
  err.textContent="";
  var fs=DARS.findFirstStableWindow(w), Wmin=Math.min.apply(null,w.w);
  var scale=Math.max(20,Math.min(54, 620/((fs.N0+1)*w.n-(Wmin-1)+4)));
  var out=DARS.svgStage(w,stage,{scale:scale, revealVars: stage===3});
  res=out.res; lineInfo=out.lineInfo;
  $("#idiag").innerHTML=out.svg;
  var svg=$("#idiag").querySelector('svg'); if(stage>=2&&svg){ svg.classList.add('hoverable'); wireHover(svg); }
  $("#panel").innerHTML=panelHTML(w); renderSteps();
  if(stage===3&&svg){ var rb=$("#replay"); if(rb) rb.onclick=function(){ revealColours(res.diagram.N); }; revealColours(res.diagram.N); }
  else clearColours();
 }

 // ---------- mode + events ----------
 function setMode(m){ mode=m; clearColours();
  document.querySelectorAll('.modeswitch button').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-mode')===m); });
  $("#calc").classList.toggle('active',m==='calc'); $("#illus").classList.toggle('active',m==='illus');
  $("#calcopts").style.display = m==='calc' ? 'inline-flex' : 'none';
  sub.innerHTML = m==='calc'
    ? 'Compute <code>w &#8614; (P&#772;, Q&#772;, &lambda;, N&#8320;)</code> of Huang &amp; Zhang (<a href="https://arxiv.org/abs/2605.20383" target="_blank" rel="noopener">arXiv:2605.20383</a>). Type a window; everything updates live.'
    : 'Walk through the construction stage by stage. <span class="k">Tip: a small window such as [5,4,3] keeps the edge labels legible.</span>';
  render();
 }
 function render(){ if(mode==='calc') renderCalc(); else renderIllus(); }

 var timer=null;
 winEl.addEventListener('input',function(){ clearTimeout(timer); timer=setTimeout(render,120); });
 $("#optBoundary").addEventListener('change',render); $("#optEdges").addEventListener('change',render);
 document.querySelectorAll('.chip').forEach(function(b){ b.onclick=function(){ winEl.value=b.getAttribute('data-ex'); render(); }; });
 $("#rand").onclick=function(){ var n=2+Math.floor(Math.random()*4),base=[]; for(var i=1;i<=n;i++)base.push(i);
   for(var k=n-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var t=base[k];base[k]=base[j];base[j]=t;}
   winEl.value=base.map(function(v){return v+n*(Math.floor(Math.random()*5)-1);}).join(", "); render(); };
 document.querySelectorAll('.modeswitch button').forEach(function(b){ b.onclick=function(){ setMode(b.getAttribute('data-mode')); }; });
 document.addEventListener('keydown',function(e){ if(mode!=='illus') return;
   if(e.key==='ArrowRight'){ stage=(stage+1)%4; renderIllus(); } else if(e.key==='ArrowLeft'){ stage=(stage+3)%4; renderIllus(); } });

 setMode('calc');
})();
</script>
</body>
